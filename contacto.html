<section class="seccion-contacto revelar-contacto" id="seccion-contacto">
    <div class="contenedor-contacto-principal" id="contenedor-principal-contacto">

        <div class="camino-pista-contacto">
            <div class="punto-orbita-contacto" style="animation-delay: 0s;"></div>
            <div class="punto-orbita-contacto" style="animation-delay: -2s;"></div>
            <div class="punto-orbita-contacto" style="animation-delay: -4s;"></div>
            <div class="punto-orbita-contacto" style="animation-delay: -6s;"></div>
        </div>

        <div class="glow-contacto glow-contacto-superior"></div>
        <div class="glow-contacto glow-contacto-inferior"></div>

        <div class="contenido-contacto">
            <div class="grid-contacto">

                <div class="columna-contacto-info">
                    <div>
                        <p id="contacto-etiqueta" class="etiqueta-contacto"></p>
                        <h2 id="contacto-titulo" class="titulo-contacto"></h2>
                    </div>

                    <p id="contacto-descripcion" class="descripcion-contacto"></p>

                    <div id="contacto-estado" class="estado-contacto">
                        <div class="punto-estado-contacto">
                            <span></span>
                            <span></span>
                        </div>
                        <span id="contacto-estado-texto"></span>
                    </div>
                </div>

                <div id="contacto-listado" class="listado-contacto"></div>

            </div>

            <div class="acciones-contacto">
                <a id="contacto-boton-cv" class="boton-contacto boton-contacto-principal" href="#">
                    <span class="material-symbols-outlined">download</span>
                    <span id="contacto-boton-cv-texto"></span>
                </a>

                <a id="contacto-boton-linkedin" class="boton-contacto boton-contacto-secundario" href="#" target="_blank">
                    <span id="contacto-boton-linkedin-texto"></span>
                    <span class="material-symbols-outlined">arrow_forward</span>
                </a>
            </div>
        </div>

    </div>
</section>
