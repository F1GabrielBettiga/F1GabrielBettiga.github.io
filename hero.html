<!-- hero.html -->

<section id="inicio" class="relative min-h-screen flex items-center overflow-hidden pt-32 pb-20 px-6">

    <!-- Fondos atmosféricos -->
    <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-cyan-400/5 rounded-full blur-[120px]"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[30%] h-[30%] bg-violet-500/5 rounded-full blur-[100px]"></div>

    <div class="relative z-10 max-w-7xl mx-auto w-full grid grid-cols-1 lg:grid-cols-2 gap-14 items-center">

        <!-- Texto -->
        <div class="contenedor-texto-hero order-2 lg:order-1">

            <div id="hero-insignia"
                class="hidden inline-flex items-center gap-2 px-3 py-1.5 mb-6 border border-white/10 rounded-full bg-white/5 backdrop-blur-md">
                <span class="w-2 h-2 rounded-full bg-cyan-400 animate-pulse"></span>
                <span id="hero-insignia-texto"
                    class="fuente-texto text-xs font-bold tracking-widest text-cyan-300 uppercase"></span>
            </div>

            <h1 id="hero-titulo" class="titulo-hero text-5xl md:text-6xl xl:text-7xl text-white mb-6">
            </h1>

            <p id="hero-descripcion" class="texto-hero text-lg md:text-xl text-slate-300 max-w-2xl mb-8">
            </p>

            <div id="hero-etiquetas" class="flex flex-wrap gap-3 mb-10">
            </div>

            <a id="hero-boton-cv" href="#" target="_blank"
                class="hidden group relative inline-flex items-center gap-3 px-8 py-4 bg-cyan-400/10 border border-cyan-400/50 text-cyan-300 rounded-xl font-bold tracking-wider hover:bg-cyan-400/20 hover:shadow-[0_0_20px_rgba(0,219,233,0.3)] transition-all duration-300 active:scale-95">
                <span class="material-symbols-outlined group-hover:translate-y-0.5 transition-transform">download</span>
                <span id="hero-boton-cv-texto" class="uppercase text-sm"></span>
                <div
                    class="absolute -inset-0.5 bg-cyan-400/20 blur opacity-0 group-hover:opacity-100 transition-opacity rounded-xl">
                </div>
            </a>

        </div>

        <!-- Imagen -->
        <div id="hero-contenedor-imagen"
            class="contenedor-imagen-hero hidden w-full justify-center lg:justify-end order-1 lg:order-2">
            <div class="relative w-72 h-72 md:w-80 md:h-80 flex items-center justify-center">

                <div
                    class="relative z-10 w-64 h-64 md:w-72 md:h-72 rounded-full border-4 border-slate-800 overflow-hidden shadow-[0_0_40px_rgba(0,219,233,0.2)] bg-slate-900">
                    <div class="absolute inset-0 fondo-circuito opacity-20 z-0"></div>
                    <div class="barra-escaneo"></div>

                    <img id="hero-imagen" alt="Foto de perfil" class="relative z-10 w-full h-full object-cover" src="">
                </div>

                <div id="hero-insignias-imagen">
                </div>

            </div>
        </div>

    </div>
</section>
